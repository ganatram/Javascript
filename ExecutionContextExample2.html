<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      var color = "blue";

      function changeColor() {
        var anotherColor = "red";

        function swapColors() {
          var tempColor = anotherColor;
          anotherColor = color;
          color = tempColor;
        }
        swapColors();
      }
      changeColor();

      console.log("value of color is " + color);
    </script>
  </head>
  <body></body>
</html>
